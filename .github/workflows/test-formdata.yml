name: Test FormData Bug
on: [push]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npx playwright install chromium
      - run: npm run build
      - name: Test FormData with Playwright
        shell: bash
        run: |
          npx next start &
          sleep 5
          node test-formdata.mjs
